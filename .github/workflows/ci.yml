name: CI

on:
  pull_request:
    branches: [main]
  push: {}   # run on push to any branch

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy hostaagent
      - run: pytest -q
